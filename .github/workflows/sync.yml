name: Sync upstream main (+ tags)

on:
  schedule: [ { cron: "0 20 * * *" } ]   # 05:00 KST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/langchain-ai/agent-chat-ui.git
          git fetch upstream --tags --prune
          git checkout main
          git reset --hard upstream/main
          git push --force-with-lease origin main
          # mirror upstream tags into your fork (drop this line if you don't need tags)
          git push origin --tags